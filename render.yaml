# Single Node service: the API also serves the built web app (one origin, one URL).
services:
  - type: web
    name: shaykopi-interview-bot
    runtime: node
    buildCommand: npm install && npm run build -w @interview-bot/web && npm run build -w @interview-bot/server
    startCommand: npm run start -w @interview-bot/server
    envVars:
      - key: ANTHROPIC_API_KEY
        sync: false
