services:
  - type: web
    name: shaykopi-interview-bot-api
    runtime: node
    rootDir: server
    buildCommand: npm install && npm run build
    startCommand: npm run start
    envVars:
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: WEB_ORIGIN
        value: "*"

  - type: web
    name: shaykopi-interview-bot
    runtime: static
    rootDir: web
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    routes:
      - type: rewrite
        source: /api/*
        destination: https://shaykopi-interview-bot-api.onrender.com/api/*
